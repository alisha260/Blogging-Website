name: PR Validation

on:
  pull_request:
    branches: [develop]

jobs:
  lint:
    name: Lint HTML and CSS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run HTMLHint
        run: npx htmlhint "src/**/*.html"

      - name: Run Stylelint
        run: npx stylelint "styles/**/*.css"

  build:
    name: Build Website with Parcel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Parcel build
        run: npx parcel build src/index.html
